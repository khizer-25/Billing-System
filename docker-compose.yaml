services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: billing-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: billing-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env